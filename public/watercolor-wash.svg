<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <linearGradient id="washGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#edf4ea" />
      <stop offset="40%" stop-color="#f6faf5" />
      <stop offset="70%" stop-color="#e3f0e5" />
      <stop offset="100%" stop-color="#edf4ea" />
    </linearGradient>
    <filter id="watercolorNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="3" />
      <feColorMatrix
        type="matrix"
        values="
          0 0 0 0 0.56
          0 0 0 0 0.70
          0 0 0 0 0.60
          0 0 0 0.20 0"
      />
      <feGaussianBlur stdDeviation="0.7" />
      <feBlend in="SourceGraphic" mode="soft-light" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#washGradient)" filter="url(#watercolorNoise)" />
</svg>

